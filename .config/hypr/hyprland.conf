# https://wiki.hyprland.org/Configuring/Monitors/
monitor = desc:GIGA-BYTE TECHNOLOGY CO. LTD. M34WQ 0x00000020,3440x1440@144.00101Hz,0x0,1,bitdepth,10,vrr,0
monitor = desc:Dell Inc. DELL P2422HE FVW89M3,preferred,-1920x-125,1
monitor = desc:Dell Inc. DELL P2422HE 7SSFV34,preferred,-1920x-125,1
monitor = desc:AU Optronics 0xD9A3,preferred,0x0,1
monitor = ,preferred,auto,auto

source = config-desktop.conf
#source = config-laptop.conf

###############################################################
#begin Consts

$mainMod       = SUPER
$terminal      = kitty
$fileManager   = nautilus
$menu          = rofi -combi-modi 'drun,window' -show combi -emoji-mode copy -no-show-match -no-sort -no-persist-history
$gameWorkspace = 9
$appW          = (monitor_h*1.389) # ((monitor_h*0.9)*4.63/3)
$appH          = (monitor_h*0.9)

#end Consts
###############################################################

env = QT_QPA_PLATFORMTHEME,qt6ct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = hyprpaper
exec-once = hyprsunset
exec-once = nm-applet
exec-once = blueman-applet
exec-once = swayosd-server 
exec-once = hyprpm reload dynamic-cursors
exec-once = kdeconnect-cli --refresh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

###############################################################
#begin Variables

debug {
    disable_logs = false
}

general {
    gaps_in = 2
    gaps_out = 0
    border_size = 2
    col.active_border = rgb(cba6f7) rgb(cba6f7) rgb(ff6ec7) 45deg
    col.inactive_border = rgba(cba6f74f) rgba(cba6f74f) rgba(ff6ec74f) 45deg
    resize_on_border = true

    layout = master

    allow_tearing = true
}

input {
    kb_layout = br,us
    kb_variant =
    kb_model =
    # man xkeyboard-config
    kb_options = grp:switch,grp:shift_caps_toggle
    kb_rules =

    follow_mouse = 2

    touchpad {
        natural_scroll = false
        scroll_factor = 0.75

        #middle_button_emulation = true
    }
}

device {
    # bluetooth at 3600 dpi
    name = mm712-hybrid-mouse
    sensitivity = -1.0
}

device {
    # 2.4ghz at 3600 dpi
    name = cooler-master-cooler-master-mice-dongle-1
    sensitivity = -1.0
}

device {
    # usb at 3600 dpi
    name = cooler-master-mm712-hybrid-mouse-1
    sensitivity = -1.0
}

gestures {
    gesture = 3, horizontal, workspace
    workspace_swipe_distance = 300
    workspace_swipe_create_new = false
    workspace_swipe_forever = true
}

decoration {
    rounding = 0
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windows, 1, 2, default, popin 80%
    animation = fadeOut, 1, 2, default
    animation = border, 1, 10, default
    #animation = borderangle, 1, 250, linear, loop
    # animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 1, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    vrr = 3
    force_default_wallpaper = 0
    disable_hyprland_logo = true

    on_focus_under_fullscreen = 1

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    middle_click_paste = false
    render_unfocused_fps = 5
    animate_manual_resizes = true
    disable_splash_rendering = true

    enable_swallow = true
    swallow_regex = ^kitty$
    swallow_exception_regex = ^(wev|.+\.exe)$
}

binds {
    hide_special_on_workspace_change = true
}

#end Variables
###############################################################

plugin:dynamic-cursors {
    enabled = true
    mode = tilt

    shake {
        enabled = false
    }
}


###############################################################
#begin Window Rules
layerrule = match:namespace ^rofi$, blur on
layerrule = match:namespace ^rofi$, xray 1
layerrule = match:namespace ^rofi$, no_screen_share on

windowrule = match:class ^.*$, match:xwayland no, center on
windowrule = match:class ^.*$, persistent_size on

windowrule = match:class ^vlc$, float on

windowrule = match:class ^kitty$, float on

windowrule = match:class ^org\.gnome\.SystemMonitor$, float on
windowrule = match:class ^org\.gnome\.SystemMonitor$, size 1165 870

windowrule = match:class ^org\.gnome\.Nautilus$, float on
windowrule = match:class ^org\.gnome\.Nautilus$, size 1310 960
windowrule = match:class ^org\.gnome\.Nautilus$, opacity 0.92
windowrule = match:class ^org\.gnome\.Nautilus$, xray on

windowrule = match:class ^org\.gnome\.FileRoller$, float on
windowrule = match:class ^org\.gnome\.FileRoller$, size 1165 870

windowrule = match:class ^org\.pulseaudio\.pavucontrol$, float on
windowrule = match:class ^org\.pulseaudio\.pavucontrol$, size 750 900

windowrule = match:class ^org\.kde\.bluedevilwizard$, float on
windowrule = match:class ^org\.kde\.bluedevilwizard$, size 450 500

windowrule = match:class ^blueman-manager$, float on
windowrule = match:class ^blueman-manager$, size 530 550

windowrule = match:title ^Picture[- ]in[- ]Picture$, float on
windowrule = match:title ^Picture[- ]in[- ]Picture$, pin on
windowrule = match:title ^Picture[- ]in[- ]Picture$, no_initial_focus on
windowrule = match:title ^Picture[- ]in[- ]Picture$, border_size 0
windowrule = match:title ^Picture[- ]in[- ]Picture$, no_blur on
windowrule = match:title ^Picture[- ]in[- ]Picture$, move (monitor_w-window_w) (monitor_h-window_h)
#windowrule = match:title ^Picture[- ]in[- ]Picture$, size 600 337

windowrule = match:class ^virt-manager$, float on
windowrule = match:class ^virt-manager$, size 1000 700

windowrule = match:class ^org\.nomacs\.ImageLounge$, float on
windowrule = match:class ^org\.nomacs\.ImageLounge$, size 1000 1000

windowrule = match:class ^[Xx]dg-desktop-portal-gtk$, float on
windowrule = match:class ^[Xx]dg-desktop-portal-gtk$, size 950 750
windowrule = match:class ^[Xx]dg-desktop-portal-gtk$, no_shadow on
windowrule = match:class ^[Xx]dg-desktop-portal-gtk$, no_blur on
windowrule = match:class ^[Xx]dg-desktop-portal-gtk$, border_size 0

windowrule = match:class ^com.rtosta.zapzap$, workspace special:1whatsapp silent
windowrule = match:class ^com.rtosta.zapzap$, border_color rgb(25d366)
windowrule = match:class ^com.rtosta.zapzap$, float on
windowrule = match:class ^com.rtosta.zapzap$, no_screen_share on
windowrule = match:class ^com.rtosta.zapzap$, size $appW $appH

windowrule = match:class ^vesktop$, workspace special:2discord silent
windowrule = match:class ^vesktop$, border_color rgb(5865f2)
windowrule = match:class ^vesktop$, float on
windowrule = match:class ^vesktop$, size $appW $appH

windowrule = match:class ^[Ss]potify$, workspace special:3spotify silent
windowrule = match:class ^[Ss]potify$, border_color rgb(1db954)
windowrule = match:class ^[Ss]potify$, float on
windowrule = match:class ^[Ss]potify$, size $appW $appH

windowrule = match:class ^looking-glass-client$, workspace 5 silent
windowrule = match:class ^looking-glass-client$, idle_inhibit always
windowrule = match:class ^looking-glass-client$, fullscreen on

#end Window Rules 
###############################################################

###############################################################
#begin Rules for steam games

windowrule = match:xdg_tag ^proton-game$, content game
windowrule = match:class ^steam_app_.*$,  content game
windowrule = match:class ^gamescope$,     content game
windowrule = match:class ^tf_linux64$,    content game
windowrule = match:class ^cs2$,           content game

windowrule = match:class ^(steam_app_.*|gamescope|tf_linux64|cs2)$, workspace $gameWorkspace silent
windowrule = match:class ^(steam_app_.*|gamescope|tf_linux64|cs2)$, suppress_event maximize
windowrule = match:class ^(steam_app_.*|gamescope|tf_linux64|cs2)$, idle_inhibit focus
windowrule = match:class ^(steam_app_.*|gamescope|tf_linux64|cs2)$, immediate on
windowrule = match:xdg_tag ^proton-game$, workspace $gameWorkspace silent
windowrule = match:xdg_tag ^proton-game$, suppress_event maximize
windowrule = match:xdg_tag ^proton-game$, idle_inhibit focus
windowrule = match:xdg_tag ^proton-game$, immediate on

windowrule = match:class ^steam$,                                 float on
windowrule = match:class ^steam$,                                 border_color rgb(66c0f4)
windowrule = match:class ^steam$, match:title ^([Ss]team)$,       size $appW $appH
windowrule = match:class ^steam$, match:title ^([Ss]team)$,       workspace 8 silent
windowrule = match:class ^steam$, match:title ^Sign in to Steam$, workspace 8 silent
windowrule = match:class ^steam$, match:title ^Launching.+$,      workspace 8 silent
windowrule = match:class ^steam$, match:title ^Special Offers.+$, workspace 8 silent
windowrule = match:class ^steam$, match:title ^Friends List$,     workspace 8 silent
windowrule = match:class ^$,      match:title ^Steam$,            workspace 8 silent

#end Rules for steam games
###############################################################

###############################################################
#begin Rules for workspaces

workspace = special:3spotify, on-created-empty:spotify --enable-features=UseOzonePlatform --ozone-platform=wayland

#end Rules for workspaces
###############################################################

###############################################################
#begin Binds

bind = $mainMod CTRL, Escape, execr,                  ~/.config/hypr/bin/close_special.sh
bind = $mainMod CTRL, 1,      togglespecialworkspace, 1whatsapp
bind = $mainMod CTRL, 2,      togglespecialworkspace, 2discord
bind = $mainMod CTRL, 3,      togglespecialworkspace, 3spotify

# Misc binds
bind = CONTROLALT, T,       execr, $terminal
bind = ALT,        F4,      killactive, 
bind = $mainMod,   M,       exit, 
bind = $mainMod,   T,       execr, $fileManager
bind = $mainMod,   F,       togglefloating, 
bind = $mainMod,   C,       centerwindow
bind = $mainMod,   P,       pin
bind = ALT,        space,   execr, $menu
bind = $mainMod,   V,       execr, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod,   Page_Up, fullscreen, 1
bind = $mainMod,   F11,     fullscreenstate, 3

bind = $mainMod, left,  movefocus, l
bind = $mainMod, left,  bringactivetotop,
bind = $mainMod, right, movefocus, r
bind = $mainMod, right, bringactivetotop,
bind = $mainMod, up,    cyclenext, prev
bind = $mainMod, up,    bringactivetotop,
bind = $mainMod, down,  cyclenext
bind = $mainMod, down,  bringactivetotop,

bind  = $mainMod ALT, left,  swapwindow, l
binde = $mainMod ALT, left,  moveactive, -100 0
bind  = $mainMod ALT, right, swapwindow, r
binde = $mainMod ALT, right, moveactive, 100 0
bind  = $mainMod ALT, up,    swapwindow, u
binde = $mainMod ALT, up,    moveactive, 0 -100
bind  = $mainMod ALT, down,  swapwindow, d
binde = $mainMod ALT, down,  moveactive, 0 100

binde = $mainMod CTRL, right, resizeactive, 50 0
binde = $mainMod CTRL, left,  resizeactive, -50 0
binde = $mainMod CTRL, up,    resizeactive, 0 -50
binde = $mainMod CTRL, down,  resizeactive, 0 50

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, Q, workspace, 6
bind = $mainMod, W, workspace, 7
bind = $mainMod, E, workspace, 8
bind = $mainMod, R, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, Q, movetoworkspace, 6
bind = $mainMod SHIFT, W, movetoworkspace, 7
bind = $mainMod SHIFT, E, movetoworkspace, 8
bind = $mainMod SHIFT, R, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod CTRLSHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod CTRLSHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod CTRLSHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod CTRLSHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod CTRLSHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod CTRLSHIFT, Q, movetoworkspacesilent, 6
bind = $mainMod CTRLSHIFT, W, movetoworkspacesilent, 7
bind = $mainMod CTRLSHIFT, E, movetoworkspacesilent, 8
bind = $mainMod CTRLSHIFT, R, movetoworkspacesilent, 9
bind = $mainMod CTRLSHIFT, 0, movetoworkspacesilent, 10
bind = $mainMod ALT, TAB, movecurrentworkspacetomonitor, +1

# Scratchpad workspaces
bind = $mainMod,       A, togglespecialworkspace, magicA
bind = $mainMod SHIFT, A, movetoworkspace,        special:magicA
bind = $mainMod,       S, togglespecialworkspace, magicS
bind = $mainMod SHIFT, S, movetoworkspace,        special:magicS
bind = $mainMod,       D, togglespecialworkspace, magicD
bind = $mainMod SHIFT, D, movetoworkspace,        special:magicD

# Scroll through existing workspaces
bind = $mainMod,     mouse_down, workspace, e+1
bind = $mainMod,     mouse_up,   workspace, e-1
bind = $mainMod ALT, Q,          workspace, e-1
bind = $mainMod ALT, E,          workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm =         , mouse:275, movewindow
bindm =         , mouse:276, resizewindow

# Zoom
binde = $mainMod, EQUAL, execr, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.15}')
binde = $mainMod, MINUS, execr, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.85}')

# Monitor control
bindl = $mainMod, KP_Multiply,   execr, ddcutil setvcp 0x60 0x11 # HDMI-1
bindl = $mainMod, KP_Subtract,   execr, ddcutil setvcp 0x60 0x0f # DP-1
bindl = $mainMod, KP_Add,        execr, ddcutil setvcp 0x60 0x10 # USB-C / KVM
bindl = $mainMod CTRL, KP_Enter, execr, sleep 1 && hyprctl dispatch dpms on # Force the monitor to turn on because M34WQ built-in KVM is weird

bindl = $mainMod, KP_Home,     execr, hyprctl hyprsunset temperature -500
bindl = $mainMod, KP_Home,     execr, swayosd-client --custom-icon weather-clear-night --custom-message "$(hyprctl hyprsunset temperature)K"
bindl = $mainMod, KP_Up,       execr, hyprctl hyprsunset identity
bindl = $mainMod, KP_Prior,    execr, hyprctl hyprsunset temperature +500
bindl = $mainMod, KP_Prior,    execr, swayosd-client --custom-icon weather-clear-night --custom-message "$(hyprctl hyprsunset temperature)K"
bindl = $mainMod, KP_Left,     execr, hyprshade on eink
bindl = $mainMod, KP_Right,    execr, hyprshade off

# Changing volume and unmuting audio plays a sound (ocean sound pack comes with plasma 6);
bindel = $mainMod, XF86AudioRaiseVolume, execr, wpctl set-mute @DEFAULT_SINK@ 0
bindel = $mainMod, XF86AudioRaiseVolume, execr, wpctl set-volume -l 1.25 @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod, XF86AudioRaiseVolume, execr, swayosd-client --output-volume +0
bindel = $mainMod, XF86AudioRaiseVolume, execr, pw-cat --volume 0.6 -p /usr/share/sounds/freedesktop/stereo/audio-volume-change.oga

bindel = CTRL, XF86AudioRaiseVolume, execr, playerctl -p spotify volume .05+
bindel = CTRL, XF86AudioLowerVolume, execr, playerctl -p spotify volume .05-

bindel = , XF86AudioRaiseVolume, execr, wpctl set-mute @DEFAULT_SINK@ 0
bindel = , XF86AudioRaiseVolume, execr, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioRaiseVolume, execr, swayosd-client --output-volume +0
bindel = , XF86AudioRaiseVolume, execr, pw-cat --volume 0.6 -p /usr/share/sounds/freedesktop/stereo/audio-volume-change.oga

bindel = , XF86AudioLowerVolume, execr, wpctl set-mute @DEFAULT_SINK@ 0
# bindel = , XF86AudioLowerVolume, execr, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioLowerVolume, execr, swayosd-client --output-volume -5
bindel = , XF86AudioLowerVolume, execr, pw-cat --volume 0.6 -p /usr/share/sounds/freedesktop/stereo/audio-volume-change.oga

# bindl  = , XF86AudioMute,        execr, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMute,        execr, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMute,        execr, pw-cat --volume 0.6 -p /usr/share/sounds/freedesktop/stereo/audio-volume-change.oga

bindl  = $mainMod CTRL, apostrophe, execr, swayosd-client --playerctl=play-pause --player spotify
bindl  = $mainMod, apostrophe,   execr, playerctl play-pause
bindl  = , XF86AudioPlay,        execr, playerctl play-pause
bindl  = , XF86AudioNext,        execr, playerctl next
bindl  = , XF86AudioPrev,        execr, playerctl previous

bindl  = , XF86AudioMicMute,     execr, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl  = , XF86AudioMicMute,     execr, swayosd-client --input-volume +0

bindl  = $mainMod, period,       execr, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl  = $mainMod, period,       execr, swayosd-client --input-volume +0

# PrtSc lets you select a region, SHIFT+PrtSc prints the active window, $mainMod+PrtSc prints the whole screeen
bind = ,         Print, execr, ~/.config/hypr/bin/grimblast.sh --freeze copysave area "/tmp/print_$(date +%s).png"
bind = SHIFT,    Print, execr, grim -g "$(hyprctl activewindow -j | jq --raw-output '"\(.at.[0]),\(.at.[1]) \(.size.[0])x\(.size.[1])"')" - | tee "/tmp/print_$(date +%s).png" | wl-copy
bind = $mainMod, Print, execr, grim - | tee "/tmp/print_$(date +%s).png" | wl-copy

# Global binds
bind = , XF86Calculator, sendshortcut, CTRLSHIFT, M, class:^vesktop$
bind = SHIFTALT, S, sendshortcut, SHIFTALT, S,  class:^com.obsproject.Studio$

#end Binds
###############################################################
