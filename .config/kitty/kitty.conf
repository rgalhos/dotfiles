include themes/mocha.conf
include mappings.conf
include tabs.conf

font_size 12.5

#remember_window_size yes
initial_window_width 175c
initial_window_height 25c

scrollback_lines 4000

show_hyperlink_targets yes

enable_audio_bell no

cursor_trail 1
cursor_trail_decay 0.1 0.2 

scrollback_pager less -Rij.5 --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

notify_on_cmd_finish invisible 60.0 command notify-send -i kitty "Job finished with status code %s" "%c"

# Nerd Font
symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono
